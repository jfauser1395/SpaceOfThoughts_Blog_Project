<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>SpaceOfThoughts</title> <!-- Title of the web page -->
    <base href="/" /> <!-- Base URL for all relative URLs in the document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Viewport settings for responsive design -->
    <meta
      name="description"
      content="Join our blog and find out what we think about things in our space."
    /> <!-- Meta description for SEO -->
    
    <!-- preload font -->
    <link
      rel="preload"
      href="/assets/fonts/Magiesta.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    /> <!-- Preload the Magiesta font for faster loading -->

    <link rel="preload" as="image" href="/assets/loadIcon.svg" fetchpriority="high">

    <link rel="icon" href="favicon.svg" /> <!-- Favicon for the web page -->

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Theme color for the application -->
    <meta name="theme-color" content="#222222" />
  </head>
  
  <body class="scroll scroll--simple scrollHight">
    <!-- Root Angular component -->
    <app-root></app-root>
  </body>
</html>
